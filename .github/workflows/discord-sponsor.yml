name: Discord Sponsor Notification

on:
  sponsorship:
    types: [created, cancelled, tier_changed]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Post sponsor event to Discord
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_SPONSOR_WEBHOOK }}
        run: |
          SPONSOR="${{ github.event.sponsorship.sponsor.login }}"
          AVATAR="${{ github.event.sponsorship.sponsor.avatar_url }}"
          PROFILE="https://github.com/${SPONSOR}"
          TIER="${{ github.event.sponsorship.tier.name }}"
          MONTHLY="${{ github.event.sponsorship.tier.monthly_price_in_dollars }}"
          ACTION="${{ github.event.action }}"

          if [ "$ACTION" = "created" ]; then
            TITLE="New Sponsor!"
            DESC="**[${SPONSOR}](${PROFILE})** is now sponsoring WolfStack at **\$${MONTHLY}/month** (${TIER}).\n\nThank you for supporting the project!"
            COLOR=3066993
          elif [ "$ACTION" = "tier_changed" ]; then
            TITLE="Sponsor Tier Changed"
            DESC="**[${SPONSOR}](${PROFILE})** changed their sponsorship to **\$${MONTHLY}/month** (${TIER})."
            COLOR=15105570
          elif [ "$ACTION" = "cancelled" ]; then
            TITLE="Sponsor Cancelled"
            DESC="**[${SPONSOR}](${PROFILE})** has cancelled their sponsorship."
            COLOR=15158332
          fi

          jq -n \
            --arg title "$TITLE" \
            --arg desc "$DESC" \
            --arg avatar "$AVATAR" \
            --arg sponsor "$SPONSOR" \
            --arg profile "$PROFILE" \
            --argjson color "$COLOR" \
            '{
              embeds: [{
                title: $title,
                description: $desc,
                color: $color,
                thumbnail: { url: $avatar },
                author: { name: $sponsor, url: $profile, icon_url: $avatar },
                footer: { text: "GitHub Sponsors" },
                timestamp: (now | todate)
              }]
            }' > payload.json

          curl -sf -H "Content-Type: application/json" \
            -d @payload.json \
            "$WEBHOOK_URL"
