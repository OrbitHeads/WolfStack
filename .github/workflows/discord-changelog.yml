name: Discord Changelog

on:
  push:
    branches: [master]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Post changelog to Discord
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_CHANGELOG_WEBHOOK }}
        run: |
          # Gather commits from this push
          COMMITS=$(git log --pretty=format:'- %s' ${{ github.event.before }}..${{ github.event.after }} 2>/dev/null || git log --pretty=format:'- %s' -1)

          # Get version from Cargo.toml
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')

          # Build Discord embed payload
          DESCRIPTION=$(echo "$COMMITS" | head -20 | jq -Rs .)

          jq -n \
            --arg title "WolfStack v${VERSION}" \
            --argjson desc "$DESCRIPTION" \
            --arg url "${{ github.event.compare }}" \
            --arg author "${{ github.event.pusher.name }}" \
            '{
              embeds: [{
                title: $title,
                description: $desc,
                url: $url,
                color: 3447003,
                author: { name: $author },
                timestamp: (now | todate)
              }]
            }' > payload.json

          curl -sf -H "Content-Type: application/json" \
            -d @payload.json \
            "$WEBHOOK_URL"
